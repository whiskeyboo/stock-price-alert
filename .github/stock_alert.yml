name: Stock Drop Alert

on:
  schedule:
    # Every 2 hours on weekdays, all day (covers pre-market, regular, and after-hours).
    # Times are UTC. Adjust if watching SGX stocks instead of US stocks.
    - cron: "0 */2 * * 1-5"

  # Lets you trigger a run manually from the GitHub Actions tab (useful for testing).
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKERS:            ${{ vars.TICKERS }}
        run: python stock_alert.py
